<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GImage · 管理</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .record { background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    .record .r-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .record .r-head .user { font-weight: 600; }
    .record .r-prompt { font-size: 14px; margin-bottom: 8px; white-space: pre-wrap; word-break: break-all; }
    .record .r-images { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-start; }
    .record .r-images img { height: 120px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); }
    .record .r-images .input-label { font-size: 11px; color: var(--muted); text-align: center; }
    .record .r-params { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .session-header { font-size: 13px; color: var(--accent); margin: 16px 0 6px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .tab-bar { display: flex; gap: 2px; background: var(--panel-2); border-radius: 8px; padding: 3px; margin-bottom: 16px; }
    .tab-bar button { flex: 1; border: none; background: transparent; color: var(--muted); padding: 8px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .tab-bar button.active { background: var(--accent); color: #fff; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">GImage · 管理后台</div>
    <div class="right">
      <a href="/app.html">工作台</a>
      <a href="/gallery.html">图集</a>
      <button class="ghost" id="logoutBtn">退出</button>
    </div>
  </div>

  <div style="padding:20px; max-width:1100px; margin:0 auto">
    <!-- Tab bar -->
    <div class="tab-bar">
      <button class="active" data-tab="overview">概览</button>
      <button data-tab="accounts">账户管理</button>
      <button data-tab="records">会话与图片</button>
    </div>

    <!-- Tab: 概览 -->
    <div class="tab-pane active" id="tab-overview">
      <!-- 服务器状态 -->
      <div class="card" id="serverCard">
        <div class="row" style="justify-content:space-between">
          <h3 style="margin:0">服务器状态(ZenMux 账户)</h3>
          <button class="ghost" id="refreshServer" style="padding:5px 12px">刷新</button>
        </div>
        <div id="serverBody" class="muted" style="margin-top:12px">加载中…</div>
      </div>
      <div class="card" style="margin-top:16px">
        <h3 style="margin-top:0">今日用量(<span id="usageDate"></span>)</h3>
        <p class="muted">总生成 <b id="totalImages">-</b> 张 · 估算成本 ≈ $<b id="estCost">-</b>(<span id="costNote"></span>)</p>
      </div>
    </div>

    <!-- Tab: 账户管理 -->
    <div class="tab-pane" id="tab-accounts">
      <div class="card">
        <h3 style="margin-top:0">新建账户</h3>
        <div class="row" style="gap:12px; align-items:flex-end; flex-wrap:wrap">
          <div style="flex:1; min-width:140px"><label>用户名</label><input id="newUser" /></div>
          <div style="flex:1; min-width:140px"><label>密码</label><input id="newPass" /></div>
          <div style="width:110px"><label>每日配额</label><input id="newQuota" type="number" value="10" min="0" /></div>
          <div style="width:120px"><label>角色</label>
            <select id="newRole"><option value="user">普通</option><option value="admin">管理员</option></select>
          </div>
          <button id="createBtn">创建</button>
        </div>
        <div class="error" id="createErr"></div>
      </div>
      <div class="card" style="margin-top:16px">
        <h3 style="margin-top:0">账户列表</h3>
        <table>
          <thead><tr><th>用户名</th><th>角色</th><th>每日配额</th><th>今日已用</th><th>操作</th></tr></thead>
          <tbody id="accBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Tab: 会话与图片 -->
    <div class="tab-pane" id="tab-records">
      <div class="card">
        <div class="row" style="gap:12px; align-items:flex-end; margin-bottom:12px">
          <div>
            <label>选择用户</label>
            <select id="recUser" style="width:200px"><option value="__all">全部用户</option></select>
          </div>
          <button id="loadRecBtn">加载</button>
        </div>
        <div id="recordsBody"><span class="muted">选择用户后点"加载"</span></div>
      </div>
    </div>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
