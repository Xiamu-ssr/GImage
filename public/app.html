<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GImage</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="chat-wrap">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="s-head">
        <span class="brand">GImage</span>
        <button class="icon-btn" id="closeSidebar" title="收起">✕</button>
      </div>
      <div style="padding:8px">
        <button style="width:100%" id="newChatBtn">+ 新对话</button>
      </div>
      <div class="s-list" id="sessionList"></div>
      <div class="s-foot">
        <div class="s-nav">
          <a href="/gallery.html">图集</a>
          <a id="adminLink" href="/admin.html" style="display:none">管理</a>
        </div>
        <div class="row" style="justify-content:space-between">
          <span class="muted" id="who" style="font-size:12px"></span>
          <button class="ghost sm" id="logoutBtn">退出</button>
        </div>
      </div>
    </aside>

    <!-- 主区域 -->
    <div class="main">
      <div class="topbar">
        <div class="left">
          <button class="icon-btn" id="openSidebar" title="展开侧栏">☰</button>
          <span class="badge">剩余 <b id="remaining">-</b>/<span id="quota">-</span></span>
        </div>
        <div class="right">
          <div class="model-selector" id="modelSelector">
            <button class="ghost sm" id="modelBtn" style="min-width:180px;text-align:left">选择模型</button>
            <div class="model-dropdown" id="modelDropdown"></div>
          </div>
          <input type="hidden" id="model" />
          <span id="modelHint"></span>
        </div>
      </div>

      <!-- 聊天消息区 -->
      <div class="chat-body" id="chatBody">
        <div class="welcome">
          <h2>GImage</h2>
          <p>选择模型,输入提示词,开始创作</p>
        </div>
      </div>

      <!-- 底部输入栏 -->
      <div class="input-bar">
        <div class="input-inner">
          <div class="ref-preview" id="refPreview"></div>
          <div class="input-row">
            <input type="file" id="refFile" accept="image/*" multiple hidden />
            <button class="icon-btn" id="attachBtn" title="上传参考图">📎</button>
            <textarea id="prompt" rows="1" placeholder="描述你想要的画面…" autofocus></textarea>
            <button class="send-btn" id="genBtn" title="生成 (Ctrl+Enter)">➤</button>
          </div>
          <div class="input-opts" id="paramsBar"></div>
        </div>
        <div class="error" id="err" style="text-align:center"></div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
